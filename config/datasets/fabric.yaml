# ============================================================
# fabric 面料数据集 (通用格式)
# ============================================================
# 来源: Kaggle - Fabric Recognition Dataset
# 格式: 文件夹结构 (train/test/category/image.jpg)
# 总样本: 2000+ 张图片
# 原始类别 (28):
#   canvas / chambray / chenille / chiffon / corduroy
#   crepe / denim / faux_fur / faux_leather / flannel
#   fleece / gingham / jersey / knit / lace
#   lawn / neoprene / organza / plush / satin
#   serge / taffeta / tulle / tweed / twill
#   velvet / vinyl / fabric_types.txt (配置文件)
#
# 分类原则: 按材质和织法特性归并到 8 个全局类别
#   - cotton: 纯棉及棉混纺 (canvas, chambray, gingham, jersey, knit, lawn)
#   - denim: 牛仔及斜纹棉布 (denim, twill)
#   - corduroy: 灯芯绒 (corduroy)
#   - fleece: 抓绒及毛绒 (fleece, plush, faux_fur)
#   - leather: 皮革类 (faux_leather)
#   - satin_silk: 精纺及光滑织物 (satin, organza, taffeta, chiffon, crepe)
#   - wool: 羊毛及粗呢 (serge, tweed, flannel)
#   - linen: 麻纺织物 (暂无直接对应, 可扩展)
#
# 排除的类型 (质量不佳或与目标类别差异大):
#   - lace (蕾丝, 结构特异)
#   - neoprene (合成橡胶, 不属于传统织物)
#   - tulle (薄纱网, 结构特异)
#   - velvet (天鹅绒, 与现有类别差异大)
#   - vinyl (乙烯基, 合成材料)
#   - chenille (特殊毛线织物, 质量问题)
# ============================================================

raw_data: "data_ori/fabric"
output_dir: "data/d5"
source_format: "fabric"

classes:
  - corduroy
  - cotton
  - denim
  - fleece
  - leather
  - satin_silk
  - wool
  - linen

merge:
  corduroy:
    - corduroy
  cotton:
    - canvas
    - chambray
    - gingham
    - jersey
    - knit
    - lawn
  denim:
    - denim
    - twill
  fleece:
    - fleece
    - plush
    - faux_fur
  leather:
    - faux_leather
  satin_silk:
    - satin
    - organza
    - taffeta
    - chiffon
    - crepe
  wool:
    - serge
    - tweed
    - flannel
  linen: []

exclude:
  - lace
  - neoprene
  - tulle
  - velvet
  - vinyl
  - chenille
  - fabric_types.txt

balance: 600
limits: {}
