# ============================================================
# WISUDAA v1 面料数据集 (Roboflow Multiclass)
# ============================================================
# 来源: Roboflow / WISUDAA
# URL: https://universe.roboflow.com/ta-rgrwi/wisudaa
# License: CC BY 4.0
# 格式: Roboflow Multiclass (train/valid + _classes.csv)
# 总图片: 16,840
# 预处理: Auto-orientation, Resize 640×640 (Stretch)
# 增强: Random brightness -14%→+14% × 3 版本
# 原始类别 (14):
#   BROCADE  /  CANVAS   /  COTTON
#   DENIM    /  JACQUARD /  JERSEY
#   LEATHER  /  LINEN    /  NYLON
#   ORGANZA  /  POLYESTER /  RAYON
#   SATIN    /  SILK     /  SPANDEX
#   SUEDE    /  WOOL
# ============================================================

raw_data: "data_ori/wisudaa"
output_dir: "data/d4"
source_format: "roboflow"

classes:
  - cotton
  - linen
  - corduroy
  - denim
  - fleece
  - leather
  - satin_silk
  - wool

merge:
  cotton:
    - CANVAS
    - COTTON
    - JERSEY
  linen:
    - LINEN
  denim:
    - DENIM
  leather:
    - LEATHER
    - SUEDE
  satin_silk:
    - SATIN
    - SILK
  wool:
    - WOOL

exclude:
  - BROCADE
  - JACQUARD
  - NYLON
  - ORGANZA
  - POLYESTER
  - RAYON
  - SPANDEX

limits: {}

balance: 600
