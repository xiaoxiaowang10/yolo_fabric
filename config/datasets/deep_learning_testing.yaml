# ============================================================
# Deep Learning Testing 数据集 (Roboflow Multiclass)
# ============================================================
# 来源: Roboflow / Deep Learning Testing
# URL: https://universe.roboflow.com/group-12-mcgzh/deep-learning-testing
# License: CC BY 4.0
# 格式: Roboflow Multiclass (train/valid + _classes.csv)
# 总图片: 342
# 预处理: Auto-orientation, Resize 640×640 (Stretch)
# 增强: 无
# 原始类别 (4):
#   Cotton  /  Silk  /  Synthetic  /  Unlabeled
# ============================================================

raw_data: "data_ori/deep_learning_testing"
output_dir: "data/d3"
source_format: "roboflow"

classes:
  - cotton
  - linen
  - corduroy
  - denim
  - fleece
  - leather
  - satin_silk
  - wool

merge:
  cotton:
    - Cotton
  satin_silk:
    - Silk

exclude:
  - Synthetic
  - Unlabeled

limits: {}

balance: 600
